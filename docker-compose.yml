services:
  postgres:
    image: postgres:18-alpine
    container_name: ccc-postgres
    environment:
      POSTGRES_DB: ${CCC_DB_NAME:-city_communication_center}
      POSTGRES_USER: ${CCC_DB_USER:-ccc}
      POSTGRES_PASSWORD: ${CCC_DB_PASSWORD}
      PGDATA: /var/lib/postgresql/18/docker
    ports:
      - "${CCC_DB_HOST_PORT:-15432}:5432"
    volumes:
      - postgres18_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ccc-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:${CCC_API_CONTAINER_PORT:-80}
      - ConnectionStrings__CityCommunicationCenter=Host=${CCC_DB_HOST:-postgres};Port=${CCC_DB_PORT:-5432};Database=${CCC_DB_NAME:-city_communication_center};Username=${CCC_DB_USER:-ccc};Password=${CCC_DB_PASSWORD};Include Error Detail=true
      - Database__ApplyMigrationsOnStartup=true
      - Authentication__Issuer=${CCC_AUTH_ISSUER:-https://city-communication-center.local}
      - Authentication__Audience=${CCC_AUTH_AUDIENCE:-city-communication-center-api}
      - Authentication__SigningKey=${CCC_SIGNING_KEY}
      - Authentication__InitialPassword=${CCC_INITIAL_PASSWORD}
      - Authentication__EnableLocalUsers=true
      - Cors__AllowedOrigins__0=${CCC_FRONTEND_PUBLIC_ORIGIN:-http://localhost:13000}
      - Cors__AllowedOrigins__1=http://localhost:5173
      - DataProtection__KeysDirectory=/var/lib/city-communication-center/dataprotection
    ports:
      - "${CCC_API_HOST_PORT:-15000}:${CCC_API_CONTAINER_PORT:-80}"
    volumes:
      - dataprotection_keys:/var/lib/city-communication-center/dataprotection
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_ORIGIN: ${CCC_API_PUBLIC_ORIGIN:-}
    container_name: ccc-frontend
    ports:
      - "${CCC_FRONTEND_HOST_PORT:-13000}:80"
    depends_on:
      - api

volumes:
  postgres18_data:
  dataprotection_keys:
