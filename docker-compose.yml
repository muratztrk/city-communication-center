services:
  postgres:
    image: postgres:18-alpine
    container_name: ccc-postgres
    environment:
      POSTGRES_DB: city_communication_center
      POSTGRES_USER: ccc
      POSTGRES_PASSWORD: ${CCC_DB_PASSWORD}
      PGDATA: /var/lib/postgresql/18/docker
    ports:
      - "5432:5432"
    volumes:
      - postgres18_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ccc-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__CityCommunicationCenter=Host=postgres;Port=5432;Database=city_communication_center;Username=ccc;Password=${CCC_DB_PASSWORD};Include Error Detail=true
      - Database__ApplyMigrationsOnStartup=true
      - Authentication__Issuer=https://city-communication-center.local
      - Authentication__Audience=city-communication-center-api
      - Authentication__SigningKey=${CCC_SIGNING_KEY}
      - Authentication__InitialPassword=${CCC_INITIAL_PASSWORD}
      - Authentication__EnableLocalUsers=true
      - DataProtection__KeysDirectory=/var/lib/city-communication-center/dataprotection
    ports:
      - "5000:80"
    volumes:
      - dataprotection_keys:/var/lib/city-communication-center/dataprotection
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_ORIGIN: http://localhost:5000
    container_name: ccc-frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres18_data:
  dataprotection_keys:
