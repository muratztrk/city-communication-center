services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${CCC_DB_NAME:-city_communication_center}
      - POSTGRES_USER=${CCC_DB_USER:-ccc}
      - POSTGRES_PASSWORD=${CCC_DB_PASSWORD:?CCC_DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CCC_DB_USER:-ccc} -d ${CCC_DB_NAME:-city_communication_center}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=${CCC_ASPNETCORE_ENVIRONMENT:-Production}
      - ASPNETCORE_URLS=http://+:${CCC_API_CONTAINER_PORT:-80}
      - ConnectionStrings__CityCommunicationCenter=Host=${CCC_DB_HOST:-postgres};Port=${CCC_DB_PORT:-5432};Database=${CCC_DB_NAME:-city_communication_center};Username=${CCC_DB_USER:-ccc};Password=${CCC_DB_PASSWORD};Include Error Detail=${CCC_DB_INCLUDE_ERROR_DETAIL:-false}
      - Database__ApplyMigrationsOnStartup=true
      - Authentication__Issuer=${CCC_AUTH_ISSUER:-https://city-communication-center.local}
      - Authentication__Audience=${CCC_AUTH_AUDIENCE:-city-communication-center-api}
      - Authentication__SigningKey=${CCC_SIGNING_KEY:?CCC_SIGNING_KEY is required}
      - Authentication__InitialPassword=${CCC_INITIAL_PASSWORD}
      - Authentication__EnableLocalUsers=true
      - Authentication__SessionCookie__SameSite=${CCC_SESSION_COOKIE_SAME_SITE:-Lax}
      - Authentication__SessionCookie__SecurePolicy=${CCC_SESSION_COOKIE_SECURE_POLICY:-Always}
      - Cors__AllowedOrigins__0=${CCC_FRONTEND_PUBLIC_ORIGIN:-http://localhost:13000}
      - Cors__AllowedOrigins__1=http://localhost:5173
      - DataProtection__KeysDirectory=/var/lib/city-communication-center/dataprotection
      - SocialWebhooks__SharedSecret=${CCC_SOCIAL_WEBHOOK_SECRET:-}
    ports:
      - "${CCC_API_HOST_PORT:-15000}:${CCC_API_CONTAINER_PORT:-80}"
    volumes:
      - dataprotection_keys:/var/lib/city-communication-center/dataprotection
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:${CCC_API_CONTAINER_PORT:-80}/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_ORIGIN: ${CCC_API_PUBLIC_ORIGIN:-}
        VITE_TENANT_ID: ${CCC_TENANT_ID:-}
    restart: unless-stopped
    ports:
      - "${CCC_FRONTEND_HOST_PORT:-13000}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
    name: ${CCC_DB_VOLUME_NAME:-city-communication-center-postgres18-data}
  dataprotection_keys:
    name: ${CCC_DP_KEYS_VOLUME_NAME:-city-communication-center-dataprotection-keys}
